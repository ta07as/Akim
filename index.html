<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talas_profi | Официальный сайт</title>
    <style>
        /* Общие системные настройки сайта */
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Arial', sans-serif; color: #fff; overflow-x: hidden; }
    </style>
</head>
<body>

   <section class="tp-hero-section">
    <style>
        /* Изолированные стили только для этого блока */
        .tp-hero-section {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            background-color: #000000;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            border-bottom: 2px solid #111;
        }

        /* ЛЕВАЯ СТОРОНА: КОНТЕНТ */
        .tp-hero-content {
            flex: 1;
            min-width: 320px;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: #050505;
            box-sizing: border-box;
        }

        .tp-hero-content .tp-badge {
            color: #FBBF24; /* Твое золото */
            font-size: 59px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 25px;
            display: block;
        }

        .tp-hero-content h1 {
            color: #FFFFFF;
            font-size: clamp(36px, 6vw, 72px);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            margin: 0 0 30px 0;
        }

        .tp-hero-content h1 span {
            color: #FBBF24;
        }

        .tp-hero-content p {
            color: #777777;
            font-size: 18px;
            line-height: 1.6;
            max-width: 550px;
            margin-bottom: 40px;
        }

        /* КНОПКА СВЯЗИ */
        .tp-hero-btn {
            display: inline-block;
            background-color: #FBBF24;
            color: #000000;
            padding: 22px 45px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 2px;
            width: fit-content;
            transition: 0.3s ease;
            border-radius: 2px;
        }

        .tp-hero-btn:hover {
            background-color: #FFFFFF;
            transform: scale(1.05);
        }

        /* ПРАВАЯ СТОРОНА: КАРТИНКА */
        .tp-hero-media {
            flex: 1.2;
            min-width: 320px;
            min-height: 450px;
            /* Ссылка на качественное фото инструментов */
            background: url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
            position: relative;
        }

        /* Эффект затенения для перехода */
        .tp-hero-media::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #050505, transparent);
        }

        /* АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНА (📱) */
        @media (max-width: 768px) {
            .tp-hero-section {
                flex-direction: column;
            }

            .tp-hero-content {
                padding: 60px 25px;
                text-align: center;
                order: 1;
            }

            .tp-hero-media {
                min-height: 350px;
                order: 2;
            }

            .tp-hero-media::after {
                background: linear-gradient(to bottom, #050505, transparent);
            }

            .tp-hero-btn {
                width: 100%;
                box-sizing: border-box;
            }

            .tp-hero-content p {
                margin-left: auto;
                margin-right: auto;
            }
        }
    </style>

    <div class="tp-hero-content">
        <span class="tp-badge">Talas_profi</span>
        <br></br>
        <h1>Инженерный <br> <span>Подход</span></h1>
        <p>
            Мы создаем надежные инженерные системы. 
            Профессиональный электромонтаж и сантехнические решения в Таласе.
        </p>
        <a href="https://wa.me/996755000228" class="tp-hero-btn">Связаться с мастером</a>
    </div>

    <div class="tp-hero-media"></div>

</section>
  
  
</body>
</html>
