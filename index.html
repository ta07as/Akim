<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talas_profi | Официальный сайт</title>
    <style>
        /* Общие системные настройки сайта */
        body { margin: 0; padding: 0; background-color: #000; font-family: 'Arial', sans-serif; color: #fff; overflow-x: hidden; }
    </style>
</head>
<body>


   <section class="tp-hero-section">
    <style>
        /* ОСНОВНЫЕ СТИЛИ */
        .tp-hero-section {
            display: flex;
            flex-wrap: wrap;
            min-height: 100vh;
            background-color: #000000;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            border-bottom: 2px solid #111;
            overflow: hidden;
        }

        /* КОНТЕНТ */
        .tp-hero-content {
            flex: 1;
            min-width: 320px;
            padding: 80px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: #050505;
            box-sizing: border-box;
            z-index: 2;
        }

        /* АНИМАЦИЯ ПОЯВЛЕНИЯ ТЕКСТА */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tp-hero-content .tp-badge {
            color: #FBBF24;
            font-size: clamp(30px, 8vw, 59px); /* Адаптивный размер */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: clamp(4px, 2vw, 10px);
            margin-bottom: 15px;
            display: block;
            animation: fadeInUp 0.8s ease forwards;
        }

        .tp-hero-content h1 {
            color: #FFFFFF;
            font-size: clamp(32px, 10vw, 72px); /* Масштабирование заголовка */
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1.1;
            margin: 0 0 25px 0;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.3s forwards;
        }

        .tp-hero-content h1 span {
            color: #FBBF24;
        }

        .tp-hero-content p {
            color: #777777;
            font-size: clamp(16px, 4vw, 22px);
            line-height: 1.5;
            max-width: 550px;
            margin-bottom: 35px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.6s forwards;
        }

        /* КНОПКА */
        .tp-hero-btn {
            display: inline-block;
            background-color: #FBBF24;
            color: #000000;
            padding: 18px 35px;
            text-decoration: none;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 13px;
            letter-spacing: 2px;
            width: fit-content;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 2px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.9s forwards, btnPulse 2s infinite 2s;
        }

        @keyframes btnPulse {
            0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(251, 191, 36, 0); }
            100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
        }

        .tp-hero-btn:hover {
            background-color: #FFFFFF;
            transform: scale(1.05) translateY(-3px);
        }

        /* МЕДИА (КАРТИНКА) */
        .tp-hero-media {
            flex: 1.2;
            min-width: 320px;
            min-height: 450px;
            background: url('https://images.unsplash.com/photo-1581094794329-c8112a89af12?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
            position: relative;
            overflow: hidden;
            animation: imageZoom 20s linear infinite alternate;
        }

        @keyframes imageZoom {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .tp-hero-media::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, #050505, transparent);
            z-index: 1;
        }

        /* ТОЧНАЯ НАСТРОЙКА ДЛЯ ТЕЛЕФОНА (📱) */
        @media (max-width: 768px) {
            .tp-hero-section { 
                flex-direction: column; 
                text-align: center;
            }

            .tp-hero-content { 
                padding: 50px 20px; 
                order: 1; 
                min-height: 60vh;
                align-items: center; /* Центровка кнопки и текста */
            }

            .tp-hero-media { 
                min-height: 40vh; 
                order: 2; 
            }

            .tp-hero-media::after { 
                background: linear-gradient(to bottom, #050505, transparent); 
            }

            .tp-hero-btn { 
                width: 100%; /* Кнопка на всю ширину на мобилках */
                max-width: 300px;
                box-sizing: border-box; 
            }

            .tp-hero-content p { 
                margin-left: auto; 
                margin-right: auto; 
            }
        }
    </style>

    <div class="tp-hero-content">
        <span class="tp-badge">Talas_profi</span>
        <h1>Инженерный <br> <span>Подход</span></h1>
        <p>
            Мы создаем надежные инженерные системы. 
            Профессиональный электромонтаж и сантехнические решения в Таласе.
        </p>
        <a href="https://wa.me/996755000228" class="tp-hero-btn">Связаться с мастером</a>
    </div>

    <div class="tp-hero-media"></div>
</section>











    
    <section class="tp-workshop-mini">
    <style>
        .tp-workshop-mini {
            background-color: #000000;
            background-image: radial-gradient(#111 1px, transparent 1px);
            background-size: 20px 20px;
            padding: 60px 10px;
            font-family: 'Roboto Condensed', sans-serif;
            color: #FFFFFF;
            overflow: hidden;
        }

        .tp-mini-container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .tp-mini-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .tp-mini-header h2 {
            font-size: 28px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 3px;
            margin: 0;
            color: #FFFFFF;
        }

        .tp-mini-header h2 span {
            color: #FBBF24;
        }

        /* СЕТКА: 5 В РЯД НА ПК */
        .tp-mini-shelves {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            perspective: 800px;
        }

        .tp-mini-shelf-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ЦЕПИ */
        .tp-mini-shelf-item::before,
        .tp-mini-shelf-item::after {
            content: '';
            position: absolute;
            top: -12px;
            width: 3px;
            height: 30px;
            background: linear-gradient(#444, #111);
            border-radius: 2px;
            z-index: 1;
        }

        .tp-mini-shelf-item::before { left: 25%; }
        .tp-mini-shelf-item::after { right: 25%; }

        /* ЖЕТОН */
        .tp-mini-plate {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            width: 100%;
            padding: 20px 5px;
            margin-top: 18px;
            text-align: center;
            box-sizing: border-box;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.5);
            transform-origin: top center;
            transition: all 0.3s ease;
        }

        /* АНИМАЦИЯ КАЧАНИЯ */
        @keyframes miniSwing {
            0% { transform: rotateX(0deg); }
            25% { transform: rotateX(-12deg); }
            50% { transform: rotateX(8deg); }
            75% { transform: rotateX(-4deg); }
            100% { transform: rotateX(0deg); }
        }

        .tp-mini-shelf-item:hover .tp-mini-plate {
            animation: miniSwing 0.8s ease-out;
            border-color: #FBBF24;
            background: #111;
        }

        .tp-mini-icon {
            font-size: 26px;
            margin-bottom: 8px;
            display: block;
            filter: grayscale(1);
            transition: 0.3s;
        }

        .tp-mini-shelf-item:hover .tp-mini-icon {
            filter: grayscale(0);
            transform: scale(1.1);
        }

        .tp-mini-plate h3 {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            margin: 0;
            color: #777;
            letter-spacing: 0.5px;
            transition: 0.3s;
        }

        .tp-mini-shelf-item:hover h3 {
            color: #FBBF24;
        }

        /* АДАПТИВ ДЛЯ ТЕЛЕФОНА: ПО 3 В РЯД */
        @media (max-width: 600px) {
            .tp-mini-shelves {
                grid-template-columns: repeat(3, 1fr); /* 3 колонки */
                gap: 8px;
            }

            .tp-mini-plate {
                padding: 15px 5px;
            }

            .tp-mini-icon {
                font-size: 22px;
            }

            .tp-mini-plate h3 {
                font-size: 9px;
                letter-spacing: 0;
            }

            /* Делаем цепи чуть тоньше для мобил */
            .tp-mini-shelf-item::before,
            .tp-mini-shelf-item::after {
                height: 25px;
                width: 2px;
            }
        }
    </style>

    <div class="tp-mini-container">
        <div class="tp-mini-header">
            <h2>НАШИ <span>УСЛУГИ</span></h2>
        </div>

        <div class="tp-mini-shelves">
            <div class="tp-mini-shelf-item">
                <div class="tp-mini-plate">
                    <span class="tp-mini-icon">⚡</span>
                    <h3>Электрика</h3>
                </div>
            </div>

            <div class="tp-mini-shelf-item">
                <div class="tp-mini-plate">
                    <span class="tp-mini-icon">🚿</span>
                    <h3>Сантехника</h3>
                </div>
            </div>

            <div class="tp-mini-shelf-item">
                <div class="tp-mini-plate">
                    <span class="tp-mini-icon">🧱</span>
                    <h3>Кладка</h3>
                </div>
            </div>

            <div class="tp-mini-shelf-item">
                <div class="tp-mini-plate">
                    <span class="tp-mini-icon">✨</span>
                    <h3>Обои</h3>
                </div>
            </div>

            <div class="tp-mini-shelf-item">
                <div class="tp-mini-plate">
                    <span class="tp-mini-icon">🧹</span>
                    <h3>Клининг</h3>
                </div>
            </div>
        </div>
    </div>
</section>


    







    
    
  
</body>
</html>
