<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talas_profi | Инженерный подход</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000; /* Черный фон */
            color: #FFFFFF;           /* Белый текст */
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
        }
    </style>
</head>
<body>

    <section class="tp-main-block">
        
        <style>
            /* СТИЛИ КОНКРЕТНО ЭТОГО БЛОКА (ВНУТРИ BODY) */
            .tp-main-block {
                max-width: 1400px;
                margin: 0 auto;
                padding: 100px 20px; /* Отступы 100px сверху и снизу */
                display: flex;       /* На ПК: Инфо и Услуги в один ряд */
                gap: 50px;           /* Расстояние между ними */
                align-items: center;
            }

            /* ЛЕВАЯ СТОРОНА: ТЕКСТОВЫЙ БЛОК */
            .tp-left-info {
                flex: 0 0 380px;     /* Фиксированная ширина на ПК */
            }

            .tp-left-info h2 {
                font-size: 48px;
                font-weight: 900;
                text-transform: uppercase;
                margin: 0 0 20px 0;
                line-height: 1;
            }

            .tp-left-info h2 span {
                color: #FBBF24;     /* Твое золото */
            }

            .tp-left-info p {
                color: #666;
                font-size: 15px;
                line-height: 1.6;
                margin: 0;
            }

            /* ПРАВАЯ СТОРОНА: СЕТКА 5 В РЯД */
            .tp-right-services {
                flex: 1;
                display: grid;
                grid-template-columns: repeat(5, 1fr); /* Ровно 5 колонок */
                gap: 12px;
            }

            /* СПЛЮЩЕННЫЙ ПРЯМОУГОЛЬНИК (УСЛУГА) */
            .tp-service-card {
                background: #080808;
                border: 1px solid #1a1a1a;
                min-height: 90px;    /* Сплющенный вид */
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 10px 5px;
                text-decoration: none;
                transition: 0.3s ease;
            }

            .tp-service-card:hover {
                border-color: #FBBF24;
                background: #0c0c0c;
                transform: translateY(-3px);
            }

            .tp-service-card span {
                color: #FFFFFF;
                font-size: 11px;
                font-weight: 900;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            /* АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНА (📱) */
            @media (max-width: 1024px) {
                .tp-main-block {
                    flex-direction: column; /* На телефоне: Инфо сверху, Услуги снизу */
                    text-align: center;
                    padding: 60px 15px;
                }
                
                .tp-left-info { flex: none; width: 100%; margin-bottom: 30px; }

                /* НА ТЕЛЕФОНЕ ВСЁ ЕЩЕ 5 В РЯД */
                .tp-right-services {
                    width: 100%;
                    grid-template-columns: repeat(5, 1fr); 
                    gap: 5px;
                }

                .tp-service-card { min-height: 65px; } /* Сильнее сплющиваем на телефоне */
                .tp-service-card span { font-size: 8px; } /* Мелкий шрифт, чтобы влезло */
                .tp-left-info h2 { font-size: 32px; }
            }
        </style>

        <div class="tp-left-info">
            <h2>Инженерный <br> <span>Подход</span></h2>
            <p>
                Talas_profi — это профессионализм в каждой детали. 
                Мы проектируем и монтируем системы, которые работают годами.
            </p>
        </div>

        <div class="tp-right-services">
            
            <a href="#" class="tp-service-card">
                <span>Электрика</span>
            </a>

            <a href="#" class="tp-service-card">
                <span>Сантехника</span>
            </a>

            <a href="#" class="tp-service-card">
                <span>Кирпич</span>
            </a>

            <a href="#" class="tp-service-card">
                <span>Обои</span>
            </a>

            <a href="#" class="tp-service-card">
                <span>Клининг</span>
            </a>

        </div>

    </section>
    </body>
</html>
